<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GitDoc Ultimate</title>
<style>
:root{
--bg:#0f172a;
--card:#111827;
--text:#e5e7eb;
--muted:#94a3b8;
--accent:#3b82f6;
--border:#1e293b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,sans-serif;
background:var(--bg);
color:var(--text);
padding:20px;
}
.container{
max-width:1200px;
margin:auto;
}
h1{
font-size:2rem;
margin-bottom:10px;
}
p{
color:var(--muted);
margin-bottom:20px;
}
form{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}
input{
flex:1;
padding:14px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
}
button{
padding:14px 18px;
border:none;
border-radius:10px;
background:var(--accent);
color:white;
cursor:pointer;
font-weight:bold;
}
.card{
background:var(--card);
padding:20px;
border-radius:14px;
margin-bottom:20px;
border:1px solid var(--border);
}
pre{
overflow:auto;
background:#020617;
padding:15px;
border-radius:10px;
margin-top:10px;
white-space:pre-wrap;
}
.hidden{
display:none;
}
.loader{
margin-top:20px;
font-weight:bold;
}
</style>
</head>
<body>
<div class="container">

<h1>⚡ GitDoc Ultimate</h1>
<p>AI-анализатор GitHub репозиториев</p>

<form id="form">
<input type="url" id="repo" placeholder="https://github.com/user/repo" required>
<button type="submit">Анализировать</button>
</form>

<div id="loader" class="loader hidden">Загрузка...</div>

<div id="result" class="hidden">

<div class="card">
<h2>Описание проекта</h2>
<div id="overview"></div>
</div>

<div class="card">
<h2>Структура проекта</h2>
<pre id="tree"></pre>
</div>

<div class="card">
<h2>README</h2>
<pre id="readme"></pre>
</div>

</div>

</div>

<script>
const form = document.getElementById("form");
const loader = document.getElementById("loader");
const result = document.getElementById("result");

form.addEventListener("submit", async (e)=>{
e.preventDefault();

loader.classList.remove("hidden");
result.classList.add("hidden");

try{

const url = document.getElementById("repo").value.trim();

const match = url.match(/github\.com\/([^/]+)\/([^/]+)/);

if(!match){
throw new Error("Неверная ссылка GitHub");
}

const owner = match[1];
const repo = match[2].replace(".git","");

const repoRes = await fetch(`https://api.github.com/repos/${owner}/${repo}`);

if(!repoRes.ok){
throw new Error("Репозиторий не найден");
}

const repoData = await repoRes.json();

const branch = repoData.default_branch || "main";

const treeRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`);

if(!treeRes.ok){
throw new Error("Не удалось получить дерево файлов");
}

const treeData = await treeRes.json();

const files = treeData.tree || [];

let structure = "";

files.slice(0,80).forEach(f=>{
const depth = f.path.split("/").length - 1;
const indent = "  ".repeat(depth);
const icon = f.type === "tree" ? "📁" : "📄";
const name = f.path.split("/").pop();
structure += `${indent}${icon} ${name}\n`;
});

const overview = `
Название: ${repoData.name}

Описание:
${repoData.description || "Описание отсутствует"}

⭐ Stars: ${repoData.stargazers_count}
🍴 Forks: ${repoData.forks_count}
🧠 Язык: ${repoData.language || "Не определён"}
`;

const readme = `
# ${repoData.name}

${repoData.description || "Описание отсутствует"}

## Установка

git clone ${url}

cd ${repo}

npm install

## Запуск

npm start
`;

document.getElementById("overview").innerText = overview;
document.getElementById("tree").innerText = structure;
document.getElementById("readme").innerText = readme;

result.classList.remove("hidden");

}catch(err){
alert(err.message);
}finally{
loader.classList.add("hidden");
}

});
</script>

</body>
</html>
